schema: language_comparanda_registry.v1
date: "2026-06-20"
translation_delta: NONE
project_status: closed_archival
global_stop_rule: >-
  Comparanda may define controls and benchmarks only. Do not promote 469
  plaintext, symbol-letter mappings, or code-word claims unless CipSoft/in-game
  ground truth provides number-to-text, book-to-text, or symbol-to-meaning
  evidence. Mechanism-only hypotheses must beat controls and improve MDL.

