# Eye/sprite source registry for mechanism-only follow-up.
#
# This file intentionally stores no sprite-derived counts as facts until a
# frame/orientation/image is captured and reviewed. The review hypothesis is
# useful because of lore arity, not because an unverified sprite count proves a
# decoder.

schema: eye_count_source_registry.v1
created_at: 2026-06-19
translation_delta: NONE
policy:
  - Count visible eyes only from a named frame, orientation, and source image.
  - Separate visible sprite count from lore/anatomy claims.
  - Treat sprite changes as source cues or controls, not semantic proof.
  - Do not promote plaintext, glossaries, or number-to-word pairs.

